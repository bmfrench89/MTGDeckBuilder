<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>{% block title %}MTG Deckbuilder{% endblock %}</title>
<meta name="theme-color" content="#0b0d13">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Deckbuilder">
<link rel="manifest" href="/static/manifest.webmanifest">
<link rel="icon" href="/static/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/static/icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Rajdhani:wght@500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
<style>
:root{--void:#0b0d13;--panel:#151924;--panel2:#1c2130;--accent:#5BE0D4;--accent2:#8aa0ff;
  --warn:#E86A6A;--gold:#E8B84B;--text:#e8ecf5;--muted:#8a93a8;}
*{box-sizing:border-box}
body{margin:0;background:var(--void);color:var(--text);font-family:'Rajdhani',sans-serif;line-height:1.5}
a{color:var(--accent);text-decoration:none}a:hover{text-decoration:underline}
nav{position:sticky;top:0;z-index:10;background:rgba(11,13,19,.92);backdrop-filter:blur(8px);
  border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:6px;
  padding:10px 18px;flex-wrap:wrap}
nav .brand{font-family:'Oswald',sans-serif;font-weight:700;font-size:1.15rem;color:var(--accent);
  margin-right:14px;letter-spacing:.5px}
nav a.tab{color:var(--muted);padding:6px 12px;border-radius:20px;font-size:.92rem}
nav a.tab:hover{color:var(--text);text-decoration:none}
nav a.tab.on{background:var(--accent);color:#000;font-weight:700}
.wrap{max-width:1080px;margin:0 auto;
  padding:26px max(18px,env(safe-area-inset-right)) 70px max(18px,env(safe-area-inset-left))}
nav{padding-top:max(10px,env(safe-area-inset-top))}
h1{font-family:'Oswald',sans-serif;color:var(--accent);margin:0 0 4px}
h2{font-family:'Oswald',sans-serif;color:var(--accent);margin:26px 0 10px;font-size:1.35rem}
.sub{color:var(--muted);margin-bottom:18px}
.card{background:var(--panel);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:18px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
table{width:100%;border-collapse:collapse;font-family:'JetBrains Mono',monospace;font-size:.86rem}
th,td{text-align:left;padding:8px 10px;border-bottom:1px solid rgba(255,255,255,.07)}
th{color:var(--muted);font-weight:600}
.pill{display:inline-block;padding:1px 9px;border-radius:20px;font-size:.72rem;font-weight:700;
  font-family:'JetBrains Mono',monospace}
.b2{background:#3a4b6e;color:#cfe0ff}.b3{background:#4a7a5f;color:#d7ffe9}
.b4{background:#7a4a4a;color:#ffd7d7}.b5{background:#7a4a6e;color:#ffd7f2}.b1{background:#4a4a4a;color:#ddd}
.muted{color:var(--muted)}.warn{color:var(--warn)}.gold{color:var(--gold)}.good{color:var(--accent)}
.meter{height:9px;border-radius:6px;background:rgba(255,255,255,.08);overflow:hidden;min-width:80px}
.meter>span{display:block;height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent))}
.btn{display:inline-block;background:var(--accent);color:#000;font-weight:700;border:none;cursor:pointer;
  padding:8px 15px;border-radius:20px;font-family:'Rajdhani',sans-serif;font-size:.92rem}
.btn.ghost{background:transparent;color:var(--text);border:1px solid rgba(255,255,255,.2)}
input,textarea{background:var(--panel2);color:var(--text);border:1px solid rgba(255,255,255,.14);
  border-radius:8px;padding:8px 10px;font-family:'JetBrains Mono',monospace;font-size:.86rem}
textarea{width:100%;min-height:60vh}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
footer{color:var(--muted);font-size:.8rem;text-align:center;margin-top:40px}
.chk{accent-color:var(--accent);width:15px;height:15px}
.tablewrap{overflow-x:auto}
</style></head><body>
<nav>
  <span class="brand">🕸 MTG Deckbuilder</span>
  <a class="tab {{ 'on' if page=='home' }}" href="{{ url_for('index') }}">Decks</a>
  <a class="tab {{ 'on' if page=='build' }}" href="{{ url_for('build_next') }}">Build Next</a>
  <a class="tab {{ 'on' if page=='wishlist' }}" href="{{ url_for('wishlist_view') }}">Wishlist</a>
  <a class="tab {{ 'on' if page=='shared' }}" href="{{ url_for('shared_view') }}">Shared</a>
  <a class="tab {{ 'on' if page=='collection' }}" href="{{ url_for('collection_view') }}">Collection</a>
</nav>
<div class="wrap">
{% block content %}{% endblock %}
<footer>Local app · your collection stays on your machine · grounded by the MTG deckbuilder toolkit</footer>
</div></body></html>
